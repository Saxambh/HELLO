    background:
      radial-gradient(120% 80% at 50% 118%, var(--glow-core) 0%, var(--glow-warm) 12%, transparent 46%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 52%, var(--sky-low) 100%);
    background-attachment:fixed;
    overflow:hidden; display:grid; place-items:center; text-align:center;
    -webkit-font-smoothing:antialiased; position:relative;
  }
  #embers { position:fixed; inset:0; pointer-events:none; z-index:0; }

  .screen {
    position:relative; z-index:2;
    width:min(92vw, 620px); padding:24px;
    display:none;
  }
  .screen.active { display:block; }

  .eyebrow {
    font-family:"Cormorant Garamond", serif; font-style:italic;
    font-size:clamp(1rem, 3.6vw, 1.35rem);
    color:var(--ink-soft); margin-bottom:.55em;
  }
  .question {
    font-family:"Cormorant Garamond", serif; font-weight:500; line-height:1.04;
    font-size:clamp(2.2rem, 8vw, 4.2rem); letter-spacing:-0.01em;
    text-wrap:balance; margin-bottom:.8em;
    text-shadow:0 2px 40px rgba(255,180,120,.18);
  }
  .question .accent { font-style:italic; color:var(--gold); text-shadow:0 0 28px rgba(246,180,90,.35); }

  .anim-rise { animation:rise .9s ease forwards; }
  @keyframes rise { from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }

  .row { display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap; }
  .options { min-height:60px; }

  button {
    font-family:"Inter", sans-serif; font-weight:600; border:none; cursor:pointer;
    border-radius:999px; color:#23132b;
    transition:transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .3s, background .3s, opacity .3s, color .3s;
    touch-action:manipulation;
  }
  #yes {
    background:linear-gradient(145deg,#ffd587,var(--gold) 55%,var(--gold-deep));
    padding:16px 42px; font-size:1.15rem;
    box-shadow:0 8px 30px rgba(246,180,90,.35), inset 0 1px 0 rgba(255,255,255,.5);
  }
  #yes:hover { box-shadow:0 10px 44px rgba(246,180,90,.6); }
  #yes:focus-visible { outline:3px solid #fff; outline-offset:3px; }

  #no {
    background:rgba(255,255,255,.08); color:var(--ink-soft);
    padding:14px 32px; font-size:.98rem;
    border:1px solid rgba(255,255,255,.18); backdrop-filter:blur(4px);
  }

  .opt {
    background:rgba(255,255,255,.06); color:var(--ink);
    border:1px solid rgba(246,180,90,.35);
    padding:14px 26px; font-size:1.02rem; font-weight:500;
    backdrop-filter:blur(4px);
  }
  .opt:hover, .opt:focus-visible {
    background:linear-gradient(145deg,#ffd587,var(--gold) 60%,var(--gold-deep));
    color:#23132b; border-color:transparent;
    transform:translateY(-2px); outline:none;
    box-shadow:0 8px 26px rgba(246,180,90,.4);
  }

  .dots { display:flex; gap:8px; justify-content:center; margin-top:26px; }
  .dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.2); transition:.3s; }
  .dot.on { background:var(--gold); box-shadow:0 0 10px rgba(246,180,90,.7); }

  /* final */
  #final .big {
    font-family:"Cormorant Garamond", serif; font-weight:600;
    font-size:clamp(2.6rem, 11vw, 4.6rem); line-height:1.02; margin-bottom:.3em;
    color:var(--gold); text-shadow:0 0 34px rgba(246,180,90,.45);
  }
  #final .plan {
    font-family:"Cormorant Garamond", serif; font-style:italic;
    font-size:clamp(1.3rem, 5vw, 1.9rem); color:var(--ink); line-height:1.4;
    max-width:24ch; margin:0 auto .6em;
  }
  #final .kicker {
    font-family:"Cormorant Garamond", serif; font-style:italic;
    font-size:clamp(1.05rem,4vw,1.4rem); color:var(--ink-soft);
  }

  @media (prefers-reduced-motion: reduce) {
    .anim-rise { animation-duration:.01ms; }
    #embers { display:none; }
  }
</style>
</head>
<body>
  <canvas id="embers"></canvas>

  <!-- STEP 1: the ask -->
  <section class="screen active" id="proposal">
    <p class="eyebrow anim-rise" id="p-eyebrow"></p>
    <h1 class="question anim-rise" id="p-question" style="animation-delay:.15s"></h1>
    <div class="row anim-rise" style="animation-delay:.3s">
      <button id="yes">Yes</button>
      <button id="no">No</button>
    </div>
  </section>

  <!-- STEP 2..n: the questions (built by JS) -->
  <section class="screen" id="quiz">
    <h2 class="question" id="q-text"></h2>
    <div class="row options" id="q-options"></div>
    <div class="dots" id="q-dots"></div>
  </section>

  <!-- FINAL -->
  <section class="screen" id="final">
    <div class="big anim-rise">It's a date.</div>
    <p class="plan anim-rise" id="f-plan" style="animation-delay:.15s"></p>
    <p class="kicker anim-rise" id="f-kicker" style="animation-delay:.3s"></p>
  </section>

<script>
/* ============================================================
   ✦ EDIT EVERYTHING HERE ✦
   ============================================================ */
const CONFIG = {
  eyebrow:  "the sun's going down, and there's something I've been meaning to ask —",
  question: "Will you go on a <span class='accent'>date</span> with me?",

  // The follow-up questions. Add/remove freely. `key` is used in the final line.
  questions: [
    { key:"where", q:"Where should we go?",
      options:["Coffee ☕", "Dinner 🍜", "A long walk 🌆", "Surprise me ✨"] },
    { key:"day",   q:"Which day works?",
      options:["Friday", "Saturday", "Sunday", "You pick 💫"] },
    { key:"time",  q:"And what time?",
      options:["Late morning", "Afternoon", "Sunset 🌇", "Evening"] },
  ],

  // Final screen. Use {where} {day} {time} — must match the keys above.
  finalPlan:   "{day}, {time} — {where}.",
  finalKicker: "I already can't wait.",
};
/* ============================================================ */

// ---- wire step 1 ----
document.getElementById("p-eyebrow").textContent = CONFIG.eyebrow;
document.getElementById("p-question").innerHTML = CONFIG.question;

const proposal = document.getElementById("proposal");
const quiz     = document.getElementById("quiz");
const finalS   = document.getElementById("final");
const yes = document.getElementById("yes");
const no  = document.getElementById("no");

const answers = {};
let qIndex = 0;
let proposalActive = true;

/* ---------- the uncatchable No button ---------- */
const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const FLEE_RADIUS = 100;

// If the user prefers reduced motion, don't fling the button around —
// just leave it visible on the page but not clickable.
if (reducedMotion) { no.style.pointerEvents = "none"; no.style.opacity = ".55"; }

function placeNoFixed() {
  const r = no.getBoundingClientRect();
  // Escape any transformed ancestor: a CSS transform on a parent would make
  // it (not the viewport) the reference frame for position:fixed, throwing
  // the button off-screen. Reparenting to <body> keeps it viewport-relative.
  document.body.appendChild(no);
  no.style.position = "fixed";
  no.style.margin = "0";
  no.style.zIndex = "50";
  no.style.left = r.left + "px";
  no.style.top  = r.top + "px";
}
function fleeFrom(cx, cy) {
  const r = no.getBoundingClientRect();
  const m = 14;
  const maxX = window.innerWidth  - r.width  - m;
  const maxY = window.innerHeight - r.height - m;
  // try to land far from the cursor
  let x, y, tries = 0;
  do {
    x = m + Math.random() * Math.max(maxX - m, 0);
    y = m + Math.random() * Math.max(maxY - m, 0);
    tries++;
  } while (tries < 12 && Math.hypot((x + r.width/2) - cx, (y + r.height/2) - cy) < 220);
  no.style.left = x + "px";
  no.style.top  = y + "px";
}

document.addEventListener("mousemove", (e) => {
  if (!proposalActive || reducedMotion) return;
  const r = no.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  if (Math.hypot(e.clientX - cx, e.clientY - cy) < FLEE_RADIUS) {
    if (no.style.position !== "fixed") placeNoFixed();
    fleeFrom(e.clientX, e.clientY);
  }
});
// mobile + keyboard: it slips away on any attempt
function slip(e) {
  if (!proposalActive) return;
  if (e) e.preventDefault();
  if (no.style.position !== "fixed") placeNoFixed();
  const t = e && e.touches && e.touches[0];
  fleeFrom(t ? t.clientX : window.innerWidth/2, t ? t.clientY : window.innerHeight/2);
}
no.addEventListener("touchstart", slip, { passive:false });
no.addEventListener("click", slip);
no.addEventListener("focus", slip);

/* ---------- flow ---------- */
yes.addEventListener("click", () => {
  proposalActive = false;
  no.style.display = "none";
  switchScreen(proposal, quiz, renderQuestion);
});

function renderQuestion() {
  const item = CONFIG.questions[qIndex];
  const qText = document.getElementById("q-text");
  const qOpts = document.getElementById("q-options");
  const qDots = document.getElementById("q-dots");

  qText.textContent = item.q;
  qText.classList.remove("anim-rise"); void qText.offsetWidth; qText.classList.add("anim-rise");

  qOpts.innerHTML = "";
  item.options.forEach((label, i) => {
    const b = document.createElement("button");
    b.className = "opt anim-rise";
    b.style.animationDelay = (0.1 + i * 0.06) + "s";
    b.textContent = label;
    b.addEventListener("click", () => {
      answers[item.key] = label;
      if (qIndex < CONFIG.questions.length - 1) {
        qIndex++;
        renderQuestion();
      } else {
        showFinal();
      }
    });
    qOpts.appendChild(b);
  });

  qDots.innerHTML = "";
  CONFIG.questions.forEach((_, i) => {
    const d = document.createElement("span");
    d.className = "dot" + (i === qIndex ? " on" : "");
    qDots.appendChild(d);
  });
}

function showFinal() {
  let plan = CONFIG.finalPlan;
  Object.keys(answers).forEach(k => { plan = plan.replaceAll("{" + k + "}", answers[k]); });
  document.getElementById("f-plan").textContent = plan;
  document.getElementById("f-kicker").textContent = CONFIG.finalKicker;
  switchScreen(quiz, finalS, burst);
}

function switchScreen(from, to, after) {
  from.style.transition = "opacity .45s ease";
  from.style.opacity = "0";
  setTimeout(() => {
    from.classList.remove("active");
    from.style.opacity = "";
    to.classList.add("active");
    if (after) after();
  }, 450);
}

/* ---------- ambient embers + yes-burst ---------- */
const canvas = document.getElementById("embers");
const ctx = canvas.getContext("2d");
let W, H, particles = [];
function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); addEventListener("resize", resize);

function makeEmber(){
  return { x:Math.random()*W, y:H+Math.random()*60, r:Math.random()*2+0.6,
    vy:-(Math.random()*0.5+0.15), vx:(Math.random()-0.5)*0.25,
    life:Math.random()*0.5+0.5, burst:false };
}
if (!reducedMotion) for (let i=0;i<46;i++) particles.push(makeEmber());

function burst(){
  for (let i=0;i<100;i++) particles.push({
    x:W/2, y:H*0.5, r:Math.random()*2.6+1,
    vx:(Math.random()-0.5)*7.5, vy:(Math.random()-0.9)*7.5, life:1, burst:true });
}
function tick(){
  ctx.clearRect(0,0,W,H);
  for (let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x+=p.vx; p.y+=p.vy;
    if (p.burst){ p.vy+=0.09; p.life-=0.012; }
    const alpha = p.burst ? Math.max(p.life,0) : (0.35+Math.sin((p.y+i)*0.02)*0.25)*p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(255, ${180+(Math.random()*40|0)}, 120, ${alpha})`;
    ctx.shadowBlur = 8; ctx.shadowColor = "rgba(255,170,100,.7)";
    ctx.fill();
    if (p.burst && p.life<=0) particles.splice(i,1);
    else if (!p.burst && p.y<-10) particles[i] = makeEmber();
  }
  ctx.shadowBlur = 0;
  requestAnimationFrame(tick);
}
if (!reducedMotion) tick();
</script>
</body>
</html>
